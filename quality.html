<!DOCTYPE html>
<html>
<head>
<title>Water Quality</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="content">

<h1>Water Quality</h1>

<div class="cards">

<div class="card">
<h3>pH</h3>
<p>7.2</p>
</div>

<div class="card">
<h3>TDS</h3>
<p>240 ppm</p>
</div>

<div class="card">
<h3>Turbidity</h3>
<p>3 NTU</p>
</div>

<div class="card">
<h3>Temperature</h3>
<p>28°C</p>
</div>

<div class="card">
<h3>Chlorine</h3>
<p>0.6 mg/L</p>
</div>

<div class="card">
<h3>Status</h3>
<p>GOOD</p>
</div>

</div>

</div>

</body>
</html>
